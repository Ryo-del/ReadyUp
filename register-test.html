<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Тест регистрации</title>
    <style>
      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        max-width: 420px;
        margin: 48px auto;
        padding: 0 16px;
        color: #171717;
        background: #f7f7f5;
      }

      form {
        display: grid;
        gap: 12px;
        padding: 20px;
        border: 1px solid #ddd;
        border-radius: 8px;
        background: #fff;
      }

      label {
        display: grid;
        gap: 6px;
        font-size: 14px;
        font-weight: 600;
      }

      input {
        padding: 10px 12px;
        border: 1px solid #c9c9c9;
        border-radius: 6px;
        font: inherit;
      }

      button {
        padding: 10px 14px;
        border: 0;
        border-radius: 6px;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
        color: #fff;
        background: #146c43;
      }

      pre {
        min-height: 72px;
        margin-top: 16px;
        padding: 12px;
        overflow: auto;
        border-radius: 8px;
        background: #202124;
        color: #f1f3f4;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <h1>Регистрация</h1>

    <form id="register-form">
      <label>
        API URL
        <input id="api-url" value="http://localhost:3001/auth/register" />
      </label>

      <label>
        Username
        <input name="username" value="artem" required />
      </label>

      <label>
        Email
        <input name="email" type="email" value="artem@example.com" required />
      </label>

      <label>
        Password
        <input name="password" type="password" value="secret123" required />
      </label>

      <button type="submit">Зарегистрировать</button>
    </form>

    <pre id="result">Ответ появится здесь</pre>

    <script>
      const form = document.querySelector("#register-form");
      const result = document.querySelector("#result");

      form.addEventListener("submit", async (event) => {
        event.preventDefault();

        const apiUrl = document.querySelector("#api-url").value.trim();
        const formData = new FormData(form);
        const payload = {
          username: formData.get("username"),
          email: formData.get("email"),
          password: formData.get("password"),
        };

        result.textContent = "Отправляю...";

        try {
          const response = await fetch(apiUrl, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify(payload),
          });

          const text = await response.text();
          result.textContent = [
            `Status: ${response.status} ${response.statusText}`,
            "",
            text || "(пустой ответ)",
          ].join("\n");
        } catch (error) {
          result.textContent = `Ошибка запроса:\n${error}`;
        }
      });
    </script>
  </body>
</html>
